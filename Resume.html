<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Joseph</title>
    
    <!--1. This pulls the styled navbar layout from your navbar.css file -->
    <link rel="stylesheet" href="navbar.css">

    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        h1 {color: #ffffff}
        p {font-size: 18px; line-height: 1.6;}
        
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        .content {
            position: relative;
            z-index: 1;
            padding-top: 100px;
        }
        section {
            padding: 60px 20px;
            background: rgba(30, 30, 30, 0.6);
            border-radius: 16px;
            margin: 40px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        p.subtitle {
            font-size: 1.1rem;
            color: #cccccc;
            margin-bottom: 40px;
        }

        /* 📥 Download Buttons Container */
        .download-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        /* Styling the buttons */
        .resume-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
            min-width: 200px;
            box-sizing: border-box;
        }

        /* PDF Button (Classic bold look) */
        .pdf-btn {
            background-color: #ff3e3e;
            color: #ffffff;
            border: 2px solid #ff3e3e;
        }

        .pdf-btn:hover {
            background-color: transparent;
            color: #ff3e3e;
            transform: translateY(-3px);
        }
    </style>
</head>

<body>
  <video autoplay muted loop playsinline class="bg-video">
    <source src="Images/Background2.mp4" type="video/mp4">
    <source src="Images/Background2.mov" type="video/quicktime">
  </video>

  <div id="navbar-placeholder"></div>

<div class="content">
      <section>
          <h1>My Resume</h1>
          <p class="subtitle">Click the button below to view or download my professional resume as a PDF.</p>
          
          <div class="download-container">
              <!-- 📄 Single, Clean PDF Button -->
              <a href="Resume/Joseph_Feinberg_Resume.pdf" target="_blank" class="resume-btn pdf-btn">
                  📄 View / Download PDF
              </a>
          </div>
      </section>
  </div>

    <!-- 🚀 JavaScript to pull in your navbar -->
    <script src="navbar.js"></script>

</body>
</html>
