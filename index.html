<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joseph's Portfolio</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="CSS/navbar.css">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/sprite.css">
</head>
<body>

    <!-- Background Video -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="Images/Background1.mp4" type="video/mp4">
        <source src="Images/Background1.mov" type="video/quicktime">
    </video>

    <!-- Dynamic Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <div class="content" id="top">
        <h1 id="portfolio-title" style="cursor: pointer;">Joseph's Portfolio</h1>
        <p>Welcome to my portfolio website. Here you can find my resume, LinkedIn, and other information. 
        I built this website using HTML, CSS, and JavaScript to broaden my skills and showcase my work.</p>
    </div>

    <!-- Sprite Animation -->
    <div id="sprite-character" class="sprite-container"></div>

    <!-- Scripts -->
    <script src="JS/navbar.js"></script>
    <script src="JS/sprite.js"></script>
    
</body>
</html>
