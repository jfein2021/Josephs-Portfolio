<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joseph's Portfolio</title>
    
    <!--1. This pulls the styled navbar layout from your navbar.css file -->
    <link rel="stylesheet" href="navbar.css">
    <!-- 🎨 Load the sprite styling in your <head> -->
    <link rel="stylesheet" href="sprite.css">
    
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        h1 { color: #ffffff; }
        p { font-size: 18px; line-height: 1.6; }
        
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .content {
            position: relative;
            z-index: 1;
            padding-top: 100px; /* Gives the navbar breathing room */
            max-width: 900px;
            margin: 0 auto;
        }

        /* Styling for your section cards */
        section {
            padding: 60px 20px;
            background: rgba(30, 30, 30, 0.6);
            border-radius: 16px;
            margin: 40px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        html { scroll-behavior: smooth; }
    </style>
</head>



<body>
    <video autoplay muted loop playsinline class="bg-video">
        <source src="Images/Background1.mp4" type="video/mp4">
        <source src="Images/Background1.mov" type="video/quicktime">
        Your browser does not support the video tag.
    </video>

    <!-- 📍 The dynamic navbar placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- 📝 Main Content Container (Opened Once) -->
    <div class="content" id="top">
  
<!-- 🌟 Added the ID here so it can be clicked to trigger the sprite! -->
      <h1 id="portfolio-title" style="cursor: pointer;">Joseph's Portfolio</h1>    <p>Welcome to my portfolio website. Here you can find my resume, LinkedIn, and other information. 
       I built this website using HTML, CSS, and JavaScript to broaden my skills and showcase my work.</p>

  </div>


    <div id="sprite-character" class="sprite-container"></div>


    <div id="footer-placeholder"></div>
    <!-- 🚀 JavaScript to pull in your navbar -->
    <script src="navbar.js"></script>
    <!-- 🏃‍♂️ Load the sprite logic at the bottom of your <body> -->
    <script src="sprite.js"></script>
    
</body>
</html>
