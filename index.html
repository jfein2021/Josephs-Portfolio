<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joseph's Portfolio</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        h1 {color: #ffffff}
        p {font-size: 18px; line-height: 1.6;}
        
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        .content {
            position: relative;
            z-index: 1;
        }
        /*  NAVBAR CONTAINER */
        .navbar {
            position: fixed;            /* Keep it pinned to the top of the screen while scrolling */
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;               /* Give the bar a consistent height */
            display: flex;
            justify-content: space-between; /* Pushes the logo to the left, links to the right */
            align-items: center;
            padding: 0 50px;            /* Adds space on the outer left/right edges */
            box-sizing: border-box;     /* Keeps the padding from throwing off the 100% width */
            z-index: 100;               /* Ensures it floats safely above everything (even your content) */
        /*  Frosted Glass Effect */
            background: rgba(18, 18, 18, 0.7); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); /* For Safari compatibility */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); /* Subtle dividing line */
        }
    </style>
</head>

<body>
  <video autoplay muted loop playsinline class="bg-video">
    <source src="Images/Background1.mp4" type="video/mp4">
    <source src="Images/Background1.mov" type="video/quicktime">
    Your browser does not support the video tag.
  </video>

  <header class="navbar">
    <div class="logo">Joseph's Portfolio</div>
    <nav class="nav-links">
        <a href="#About">About</a>
        <a href="#Socials">Socials</a>
        <a href="#Gallery">Gallery</a>
    </nav>
  </header>
  
  <div class="content">
      <h1>Joseph's Portfolio</h1>
      <p>Welcome to my portfolio website.</p>
  </div>
  
</body>
</html>
