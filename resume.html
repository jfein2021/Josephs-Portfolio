<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Joseph</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="CSS/navbar.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <!-- Background Video -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="Images/Background2.mp4" type="video/mp4">
        <source src="Images/Background2.mov" type="video/quicktime">
    </video>

    <!-- Dynamic Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <div class="content">
        <section>
            <h1>My Resume</h1>
            <p class="subtitle">You can review my professional experience and background directly below or download my resume as a PDF.</p>
            
            <a href="Resume/Joseph_Feinberg_Resume.pdf" target="_blank" class="resume-btn pdf-btn" style="margin-bottom: 30px;">
                📄 View / Download PDF
            </a>

            <!-- PDF Embed -->
            <div class="pdf-wrapper">
                <object data="Resume/Joseph_Feinberg_Resume.pdf" type="application/pdf" width="100%" height="800px">
                    <div class="pdf-fallback">
                        <p>Your browser is unable to display the PDF inline.</p>
                        <a href="Resume/Joseph_Feinberg_Resume.pdf" target="_blank" class="view-link">Click here to open the document in a new tab</a>
                    </div>
                </object>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="JS/navbar.js"></script>

</body>
</html>
